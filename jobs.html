<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub - MTM Portal</title>
    <link rel="icon" type="image/webp" href="images/logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --sidebar: #1e293b; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background-color: var(--sidebar); color: white; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid #334155; position: relative;}
        .sidebar-header h2 { margin: 0; font-size: 18px; color: #38bdf8; font-weight: 700; letter-spacing: 0.5px; line-height: 1.3;}
        .nav-links { list-style: none; padding: 15px 0; margin: 0; flex: 1; overflow-y: auto;}
        .nav-links li { padding: 12px 25px; margin: 5px 15px; border-radius: 8px; transition: 0.3s; position: relative;}
        .nav-links li:hover, .nav-links li.active { background-color: var(--primary); }
        .nav-links li a { color: white; text-decoration: none; display: flex; align-items: center; justify-content: space-between; font-weight: 500; font-size: 15px; width: 100%;}
        .logout-btn { padding: 15px; margin: 20px; background-color: #ef4444; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .logout-btn:hover { background-color: #dc2626; }

        .nav-badge { display: none; width: 10px; height: 10px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 5px rgba(239, 68, 68, 0.6); animation: pulse 2s infinite;}
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Mobile Adjustments */
        .menu-toggle { display: none; font-size: 24px; cursor: pointer; color: var(--text); }
        .close-sidebar { display: none; position: absolute; top: 22px; right: 20px; font-size: 22px; cursor: pointer; color: white; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: -260px; height: 100%; } 
            .sidebar.show { left: 0; } 
            .menu-toggle { display: block; } 
            .sidebar-overlay.show { display: block; } 
            .close-sidebar { display: block; }
        }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth;}
        .top-header { background-color: white; padding: 15px 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        .top-header h3 { margin: 0; font-weight: 600; display: flex; align-items: center; gap: 15px; color: var(--text);}
        
        .container { padding: 30px; max-width: 1000px; margin: auto; width: 100%; box-sizing: border-box;}
        
        .header-section { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}
        .page-title { margin: 0; color: #1e293b; font-size: 24px; font-weight: 700;}
        .page-desc { color: #64748b; margin-top: 5px; font-size: 15px;}
        .btn-post { background-color: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);}
        .btn-post:hover { background-color: #059669; transform: translateY(-2px);}

        /* Job Cards */
        .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .job-card { background-color: var(--card-bg); border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; position: relative; transition: 0.3s; display: flex; flex-direction: column;}
        .job-card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #cbd5e1;}
        .job-card.closed { opacity: 0.7; background-color: #f8fafc; }

        .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;}
        .job-title { margin: 0; font-size: 18px; font-weight: 700; color: var(--primary);}
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        .badge-active { background: #d1fae5; color: #065f46; }
        .badge-closed { background: #fee2e2; color: #991b1b; }
        
        .company-name { font-weight: 600; color: #334155; font-size: 15px; margin-bottom: 5px;}
        .job-location { color: #64748b; font-size: 13px; display: flex; align-items: center; gap: 5px; margin-bottom: 15px;}
        
        .job-desc { font-size: 14px; color: #475569; line-height: 1.6; margin-bottom: 20px; flex: 1; white-space: pre-wrap;}
        
        .job-footer { border-top: 1px solid #f1f5f9; padding-top: 15px; margin-top: auto; display: flex; flex-direction: column; gap: 10px;}
        .job-contact { font-size: 13px; color: #0f172a; font-weight: 500; background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px dashed #cbd5e1;}
        
        .job-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #94a3b8;}
        
        .btn-edit-job { background: white; border: 1px solid #cbd5e1; color: #475569; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.3s;}
        .btn-edit-job:hover { background: #f1f5f9; color: var(--primary); border-color: var(--primary);}

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px);}
        .modal-overlay.show { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: hidden; transform: translateY(20px); animation: slideUp 0.3s forwards;}
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { to { transform: translateY(0); } }
        
        .modal-header { padding: 20px 25px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;}
        .modal-header h3 { margin: 0; color: #0f172a; font-size: 18px;}
        .close-modal { font-size: 24px; color: #94a3b8; cursor: pointer; line-height: 1;}
        .close-modal:hover { color: #ef4444; }
        
        .modal-body { padding: 25px; max-height: 60vh; overflow-y: auto;}
        .form-group { margin-bottom: 15px;}
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 13px; color: #334155;}
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 14px; box-sizing: border-box; transition: 0.3s;}
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);}
        .form-group textarea { min-height: 100px; resize: vertical;}
        
        .modal-footer { padding: 20px 25px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; gap: 10px; background: #f8fafc;}
        .btn-cancel { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 8px; font-weight: 600; color: #475569; cursor: pointer;}
        .btn-submit { background: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; color: white; cursor: pointer; transition: 0.3s;}
        .btn-submit:hover { background: #1d4ed8; }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

        #loading-text { text-align: center; color: #64748b; font-size: 16px; margin: 40px 0; font-weight: 500;}
        .empty-state { text-align: center; padding: 50px 20px; background: white; border-radius: 16px; color: #64748b; grid-column: 1 / -1;}
        
        /* Interactive message box */
        #interactive-msg { position: fixed; bottom: 30px; right: 30px; background: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); font-weight: 600; font-size: 14px; z-index: 3000; transform: translateY(100px); opacity: 0; transition: 0.4s;}
        #interactive-msg.show { transform: translateY(0); opacity: 1; }
        .msg-success { border-left: 5px solid #10b981; color: #065f46; }
        .msg-error { border-left: 5px solid #ef4444; color: #991b1b; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" style="text-decoration: none;">
                <h2>MTM Alumni<br>Association</h2>
            </a>
            <div class="close-sidebar" onclick="toggleMenu()">✖</div>
        </div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="directory.html">My Batch Directory</a></li>
            <li><a href="mentorship.html">Mentorship Hub</a></li>
            <li class="active"><a href="jobs.html">Career Hub <span class="nav-badge" id="badge-jobs"></span></a></li>
            <li><a href="noticeboard.html">Notice Board <span class="nav-badge" id="badge-notices"></span></a></li>
            <li><a href="profile.html">My Profile</a></li>
        </ul>
        <div class="logout-btn" onclick="logout()">Logout</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-header">
            <h3><span class="menu-toggle" onclick="toggleMenu()">☰</span> Career Hub</h3>
        </div>

        <div class="container">
            <div class="header-section">
                <div>
                    <h2 class="page-title">Job Opportunities</h2>
                    <p class="page-desc">Find career opportunities shared by our alumni network.</p>
                </div>
                <button class="btn-post" onclick="openJobModal(false)">+ Post a Job</button>
            </div>

            <div id="loading-text">🔄 Fetching jobs securely... Please wait.</div>
            
            <div class="jobs-grid" id="jobs-container">
                <!-- Job cards will appear here -->
            </div>
        </div>
    </div>

    <!-- Job Post / Edit Modal -->
    <div class="modal-overlay" id="job-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Post a Job Opportunity</h3>
                <div class="close-modal" onclick="closeJobModal()">×</div>
            </div>
            <div class="modal-body">
                <input type="hidden" id="job-edit-index" value="">
                
                <div class="form-group">
                    <label>Job Title / Role *</label>
                    <input type="text" id="job-title" placeholder="e.g., Senior Accountant">
                </div>
                <div class="form-group">
                    <label>Company / Organization *</label>
                    <input type="text" id="job-company" placeholder="e.g., ABC Solutions Pvt Ltd">
                </div>
                <div class="form-group">
                    <label>Location *</label>
                    <input type="text" id="job-location" placeholder="e.g., Kozhikode, Kerala">
                </div>
                <div class="form-group">
                    <label>Job Description & Requirements *</label>
                    <textarea id="job-desc" placeholder="Details about the job role, qualifications required, etc."></textarea>
                </div>
                <div class="form-group">
                    <label>How to Apply (Contact Info/Link) *</label>
                    <input type="text" id="job-contact" placeholder="Email, Phone, or Application Link">
                </div>
                
                <!-- Status field (Only visible when editing) -->
                <div class="form-group" id="status-group" style="display: none; background: #fffbeb; padding: 10px; border-radius: 8px; border: 1px dashed #f59e0b;">
                    <label style="color: #b45309;">Current Status</label>
                    <select id="job-status">
                        <option value="Active">Active (Accepting Applications)</option>
                        <option value="Filled">Closed / Position Filled</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeJobModal()">Cancel</button>
                <button class="btn-submit" id="submit-job-btn" onclick="submitJob()">Publish Job</button>
            </div>
        </div>
    </div>

    <!-- Floating Interactive Message -->
    <div id="interactive-msg"></div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzs8mI_zi4t8PU2pnAmxqG1sF0GVr6RWLC1HY8fNrDSjqFkak8a7gCJFdKvXDT1LrTERg/exec";
        const escapeHTML = str => (str || "").toString().replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        let allJobsData = [];
        let loggedInUser = null;
        let loggedInMobile = null;

        function toggleMenu() { 
            document.getElementById("sidebar").classList.toggle("show"); 
            document.getElementById("sidebar-overlay").classList.toggle("show");
        }

        // 🛡️ Security Check
        function checkSecurity() {
            const userStr = localStorage.getItem("alumniUser");
            loggedInMobile = localStorage.getItem("alumniMobile");
            const token = localStorage.getItem("alumniAuthToken");

            if (!userStr || !loggedInMobile || !token) { 
                window.location.replace("login.html"); 
                return null; 
            }
            loggedInUser = JSON.parse(userStr);
            return true;
        }

        window.onload = function() {
            if(!checkSecurity()) return;
            localStorage.setItem("lastSeenJobs", Date.now()); 
            fetchJobsData();
        };

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                if(!localStorage.getItem("alumniAuthToken")) window.location.replace("login.html");
            }
        });

        // ----------------------------------------------------
        // CACHED FETCHING LOGIC 🛡️
        // ----------------------------------------------------
        function fetchJobsData() {
            const cachedJobs = localStorage.getItem("jobCache");
            const cacheTime = localStorage.getItem("jobCacheTime");

            if (cachedJobs && cacheTime && (Date.now() - cacheTime < 300000)) {
                allJobsData = JSON.parse(cachedJobs);
                document.getElementById('loading-text').style.display = 'none';
                renderJobs();
                return;
            }

            fetch(APPS_SCRIPT_URL, {
                method: 'POST', redirect: 'follow',
                body: JSON.stringify({ action: "getJobs" }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    allJobsData = data.jobs; 
                    localStorage.setItem("jobCache", JSON.stringify(allJobsData));
                    localStorage.setItem("jobCacheTime", Date.now());

                    document.getElementById('loading-text').style.display = 'none';
                    renderJobs();
                } else {
                    document.getElementById('loading-text').innerHTML = `<span style="color:red;">Error fetching jobs.</span>`;
                }
            })
            .catch(error => { 
                document.getElementById('loading-text').innerText = "Failed to load data. Please check network."; 
            });
        }

        function renderJobs() {
            const container = document.getElementById('jobs-container');
            container.innerHTML = '';

            if(!allJobsData || allJobsData.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>No Jobs Posted Yet</h3><p>Be the first to share an opportunity with our alumni network!</p></div>`;
                return;
            }

            // സ്വയം ക്ലീൻ അപ്പ് ചെയ്യുന്ന ഫംഗ്ഷൻ (മൊബൈൽ നമ്പർ താരതമ്യം ചെയ്യാൻ)
            const cleanNum = (num) => String(num).replace(/\D/g, '');
            const safeUserMobile = cleanNum(loggedInMobile);

            allJobsData.forEach(job => {
                let isOwner = cleanNum(job.posterMobile) === safeUserMobile;
                let isActive = job.status !== "Filled";
                
                let badgeHTML = isActive ? `<span class="badge badge-active">Active</span>` : `<span class="badge badge-closed">Closed</span>`;
                let cardClass = isActive ? "" : "closed";
                
                // എസ്കേപ്പ് ക്യാരക്ടറുകൾ മാറ്റുന്നു 
                let escTitle = job.title.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                let escComp = job.company.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                let escLoc = job.location.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                let escDesc = job.desc.replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, "\\n");
                let escCont = job.contact.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                let editButtonHTML = "";
                if (isOwner) {
                    editButtonHTML = `<button class="btn-edit-job" onclick="openJobModal(true, ${job.rowIndex}, '${escTitle}', '${escComp}', '${escLoc}', '${escDesc}', '${escCont}', '${job.status}')">✏️ Edit</button>`;
                }

                const card = `
                    <div class="job-card ${cardClass}">
                        <div class="job-header">
                            <div>
                                <h3 class="job-title">${escapeHTML(job.title)}</h3>
                                <div class="company-name">${escapeHTML(job.company)}</div>
                            </div>
                            ${badgeHTML}
                        </div>
                        <div class="job-location">📍 ${escapeHTML(job.location)}</div>
                        <div class="job-desc">${escapeHTML(job.desc)}</div>
                        
                        <div class="job-footer">
                            <div class="job-contact">
                                <span style="color:#64748b; font-size:11px; text-transform:uppercase;">Apply / Contact:</span><br>
                                ${escapeHTML(job.contact)}
                            </div>
                            <div class="job-meta">
                                <span>Posted by: <b>${job.postedBy}</b></span>
                                <span>${job.date}</span>
                            </div>
                            ${isOwner ? `<div style="text-align: right; margin-top: 5px;">${editButtonHTML}</div>` : ''}
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // ----------------------------------------------------
        // MODAL & SUBMISSION LOGIC
        // ----------------------------------------------------
        function openJobModal(isEdit, rowIndex = "", title = "", comp = "", loc = "", desc = "", cont = "", status = "Active") {
            document.getElementById('job-edit-index').value = rowIndex;
            document.getElementById('job-title').value = title;
            document.getElementById('job-company').value = comp;
            document.getElementById('job-location').value = loc;
            document.getElementById('job-desc').value = desc.replace(/\\n/g, "\n");
            document.getElementById('job-contact').value = cont;
            
            if(isEdit) {
                document.getElementById('modal-title').innerText = "Edit Job Post";
                document.getElementById('submit-job-btn').innerText = "Update Details";
                document.getElementById('status-group').style.display = "block";
                document.getElementById('job-status').value = status;
            } else {
                document.getElementById('modal-title').innerText = "Post a Job Opportunity";
                document.getElementById('submit-job-btn').innerText = "Publish Job";
                document.getElementById('status-group').style.display = "none";
                document.getElementById('job-status').value = "Active";
            }
            
            document.getElementById('job-modal').classList.add('show');
        }

        function closeJobModal() {
            document.getElementById('job-modal').classList.remove('show');
        }

        function submitJob() {
            const rowIndex = document.getElementById('job-edit-index').value;
            const title = document.getElementById('job-title').value.trim();
            const company = document.getElementById('job-company').value.trim();
            const location = document.getElementById('job-location').value.trim();
            const desc = document.getElementById('job-desc').value.trim();
            const contact = document.getElementById('job-contact').value.trim();
            const status = document.getElementById('job-status').value;

            if(!title || !company || !location || !desc || !contact) {
                return showToast("Please fill all required fields.", "error");
            }

            const btn = document.getElementById('submit-job-btn');
            btn.innerText = "Processing..."; btn.disabled = true;

            const d = new Date(); 
            const dateStr = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()} IST ${d.getHours()%12||12}:${String(d.getMinutes()).padStart(2,'0')} ${d.getHours()>=12?'PM':'AM'}`;
            
            const actionName = rowIndex ? "editJob" : "addJob";
            const userToken = localStorage.getItem("alumniAuthToken");
            
            let payload = {
                action: actionName,
                mobile: loggedInMobile,
                authToken: userToken, // 🛡️ സുരക്ഷാ ടോക്കൺ
                jobData: {
                    title: title, company: company, location: location,
                    desc: desc, contact: contact, dateStr: dateStr,
                    postedBy: loggedInUser.name,
                    status: status
                }
            };
            
            if(rowIndex) payload.rowIndex = parseInt(rowIndex);

            fetch(APPS_SCRIPT_URL, {
                method: 'POST', redirect: 'follow',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                if(data.status === "success") {
                    showToast(data.message, "success");
                    closeJobModal();
                    
                    // കാഷ് ക്ലിയർ ചെയ്ത് പുതിയ ഡാറ്റ എടുക്കുന്നു
                    localStorage.removeItem("jobCache");
                    localStorage.removeItem("jobCacheTime");
                    
                    document.getElementById('loading-text').style.display = 'block';
                    document.getElementById('loading-text').innerText = "🔄 Refreshing jobs...";
                    document.getElementById('jobs-container').innerHTML = '';
                    
                    fetchJobsData();
                } else {
                    showToast(data.message, "error");
                    if(data.message.includes("Unauthorized") || data.message.includes("Security Error")) {
                        setTimeout(logout, 3000);
                    }
                }
            }).catch(e => { 
                btn.innerText = rowIndex ? "Update Details" : "Publish Job"; 
                btn.disabled = false;
                showToast("Network Error. Try again.", "error"); 
            });
        }

        function showToast(msg, type) {
            const box = document.getElementById('interactive-msg');
            box.textContent = msg; 
            box.className = type === "success" ? "msg-success show" : "msg-error show";
            setTimeout(() => { box.classList.remove('show'); }, 4000);
        }

        // Notification Badge System 🔴
        function checkNotifications() {
            const cachedUpdates = localStorage.getItem("updatesCache");
            const updatesTime = localStorage.getItem("updatesCacheTime");
            
            if (cachedUpdates && updatesTime && (Date.now() - updatesTime < 300000)) { 
                processBadges(JSON.parse(cachedUpdates));
            } else {
                fetch(APPS_SCRIPT_URL, {
                    method: 'POST', body: JSON.stringify({ action: "getLatestUpdates" }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                }).then(res => res.json()).then(data => {
                    if(data.status === "success") {
                        localStorage.setItem("updatesCache", JSON.stringify(data));
                        localStorage.setItem("updatesCacheTime", Date.now());
                        processBadges(data);
                    }
                }).catch(e => {});
            }
        }

        function processBadges(data) {
            const lastSeenNotices = localStorage.getItem("lastSeenNotices") || 0;
            if(data.latestNotice > lastSeenNotices && document.getElementById("badge-notices")) {
                document.getElementById("badge-notices").style.display = "inline-block";
            }
        }
        
        setTimeout(checkNotifications, 1000);

        function logout() { 
            localStorage.removeItem("alumniUser"); 
            localStorage.removeItem("alumniMobile"); 
            localStorage.removeItem("alumniAuthToken"); 
            
            localStorage.removeItem("jobCache");
            localStorage.removeItem("jobCacheTime");
            
            window.location.replace("login.html"); 
        }
    </script>
</body>
</html>
