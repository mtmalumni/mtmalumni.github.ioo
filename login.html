<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MTM Alumni Portal</title>
    <link rel="icon" type="image/webp" href="images/logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: var(--text); position: relative;}
        
        /* Back to Home Button */
        .back-to-home { position: absolute; top: 25px; left: 30px; color: #64748b; text-decoration: none; font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; transition: 0.3s; z-index: 10;}
        .back-to-home:hover { color: var(--primary); transform: translateX(-3px);}
        
        .login-card { background-color: white; padding: 45px 35px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08); width: 100%; max-width: 420px; box-sizing: border-box; position: relative;}
        .login-card h2 { text-align: center; color: var(--primary); margin-bottom: 10px; font-weight: 700; font-size: 26px; letter-spacing: 0.5px;}
        .login-card p.subtitle { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 14px; margin-top: 0;}
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #475569; font-weight: 500; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 14px 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; font-family: inherit; transition: 0.3s; background-color: #f8fafc;}
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); background-color: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.1);}
        
        /* Country Code Selector Styles */
        .mobile-input-group { display: flex; gap: 10px; }
        .country-select-container { position: relative; width: 40%; max-width: 150px; }
        .selected-country { width: 100%; padding: 3px 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; background-color: #f8fafc; display: flex; align-items: center; transition: 0.3s;}
        .selected-country:focus-within { border-color: var(--primary); background-color: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .selected-country input { border: none; padding: 9px 0; background: transparent; font-family: inherit; font-size: 14px; outline: none; width: 100%; font-weight: 500;}
        .selected-country small { cursor: pointer; color: #64748b; padding-left: 5px; user-select: none;}
        
        .country-dropdown { position: absolute; top: 100%; left: 0; width: 280px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; margin-top: 8px; display: none; overflow: hidden;}
        .country-dropdown.active { display: block; }
        .country-dropdown input { width: 100%; padding: 14px; border: none; border-bottom: 1px solid #f1f5f9; box-sizing: border-box; outline: none; border-radius: 0; font-family: inherit; background-color: white;}
        .country-dropdown ul { list-style: none; margin: 0; padding: 0; max-height: 220px; overflow-y: auto; }
        .country-dropdown ul li { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f8fafc; font-size: 14px; }
        .country-dropdown ul li:hover { background-color: #f1f5f9; color: var(--primary); font-weight: 500;}
        .mobile-input-group > input { flex: 1; }
        
        .btn-primary { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; font-family: inherit; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);}
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-2px);}
        .btn-secondary { background-color: #10b981; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);}
        .btn-secondary:hover { background-color: #059669; }
        
        .hidden { display: none !important; }
        #message-box { margin-top: 20px; text-align: center; font-size: 14px; font-weight: 500; padding: 15px; border-radius: 8px; }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399;}
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171;}
        
        .extra-links { text-align: center; margin-top: 25px; font-size: 14px; color: #64748b; }
        .extra-links a { color: var(--primary); text-decoration: none; font-weight: 600; transition: 0.3s;}
        .extra-links a:hover { color: #1d4ed8; text-decoration: underline; }
        .forgot-pass { display: block; text-align: right; margin-top: -10px; margin-bottom: 25px; font-size: 13px; }
        .forgot-pass a { color: var(--primary); text-decoration: none; font-weight: 500;}
        .forgot-pass a:hover { text-decoration: underline; }

        .admin-link { text-align: center; margin-top: 20px; }
        .admin-link a { color: #cbd5e1; font-size: 12px; text-decoration: none; transition: 0.3s; }
        .admin-link a:hover { color: #64748b; text-decoration: underline; }

        @media (max-width: 768px) { 
            .back-to-home { top: 15px; left: 15px; font-size: 14px;} 
            .login-card { margin-top: 40px; }
        }
    </style>
</head>

        window.onload = function() {

                window.location.replace("dashboard.html");

            populateCountries(globalCountriesList);

        function populateCountries(list) {
            const ul = document.getElementById('country-list');
            ul.innerHTML = '';
            list.forEach(country => {
                const li = document.createElement('li');
                li.innerHTML = `${country.flag} ${country.name} (${country.dial_code})`;
                li.onclick = function() { selectCountry(country.dial_code, country.flag); };
                ul.appendChild(li);
            });
        }

        function toggleCountryDropdown() {
            const dropdown = document.getElementById('country-dropdown');
            dropdown.classList.toggle('active');
            if(dropdown.classList.contains('active')) document.getElementById('country-search').focus();
        }

        function selectCountry(dialCode, flag) {
            document.getElementById('login-country-code').value = dialCode;
            document.getElementById('country-dropdown').classList.remove('active');
            document.getElementById('country-search').value = '';
            populateCountries(globalCountriesList);
        }

        function filterCountries() {
            const searchText = document.getElementById('country-search').value.toLowerCase();
            const filtered = globalCountriesList.filter(c => c.name.toLowerCase().includes(searchText) || c.dial_code.includes(searchText));
            populateCountries(filtered);
        }

        document.addEventListener('click', function(event) {
            const container = document.getElementById('custom-country-select');
            const dropdown = document.getElementById('country-dropdown');
            if (container && dropdown && !container.contains(event.target)) dropdown.classList.remove('active');
        });

            const batchElement = document.getElementById('batch');

            let cleanMobile = rawMobile.replace(/\s+/g, '');
            const fullMobileNumber = dialCode + cleanMobile;

            if(cleanMobile === "" || batch === "") { showMessage("Please enter mobile number and batch.", "error"); return; }

            globalMobileNumber = fullMobileNumber;
            globalBatch = batch;

            showMessage("Verifying... Please wait.", "success");

            fetch(APPS_SCRIPT_URL, {
                method: 'POST', redirect: 'follow',
                body: JSON.stringify({ action: "requestOTP", mobile: fullMobileNumber, batch: batch }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "otp_sent") {
                    showMessage(data.message, "success");
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                } else if(data.status === "password_required") {
                    showMessage(data.message, "success");
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-3').classList.remove('hidden');
                } else showMessage(data.message, "error");
            }).catch(e => showMessage("Network error. Try again.", "error"));
        }

        function verifyOTPAndLogin() {
            const otp = document.getElementById('otp-input').value;
            const newPass = document.getElementById('new-password').value;
            if(otp === "" || newPass === "") { showMessage("Enter OTP and new password.", "error"); return; }
            showMessage("Logging in...", "success");

            fetch(APPS_SCRIPT_URL, {
                method: 'POST', redirect: 'follow',
                body: JSON.stringify({ action: "verifyOTP", mobile: globalMobileNumber, batch: globalBatch, otp: otp, newPassword: newPass }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    localStorage.setItem("alumniUser", JSON.stringify(data.userData));
                    localStorage.setItem("alumniMobile", globalMobileNumber); 
                    if(data.authToken) localStorage.setItem("alumniAuthToken", data.authToken);
                    window.location.replace("dashboard.html");
                } else {
                    showMessage(data.message, "error");
                }
            }).catch(e => showMessage("Network error.", "error"));
        }

        function loginWithExistingPassword() {
            const pass = document.getElementById('login-password').value;
            if(pass === "") { showMessage("Enter your password.", "error"); return; }
            showMessage("Logging in...", "success");

            fetch(APPS_SCRIPT_URL, {
                method: 'POST', redirect: 'follow',
                body: JSON.stringify({ action: "loginPassword", mobile: globalMobileNumber, batch: globalBatch, password: pass }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    localStorage.setItem("alumniUser", JSON.stringify(data.userData));
                    localStorage.setItem("alumniMobile", globalMobileNumber); 
                    if(data.authToken) localStorage.setItem("alumniAuthToken", data.authToken);
                    window.location.replace("dashboard.html");
                } else showMessage(data.message, "error");
            }).catch(e => showMessage("Network error.", "error"));
        }

        function triggerForgotPassword() {
            showMessage("Sending OTP...", "success");
            fetch(APPS_SCRIPT_URL, {
                method: 'POST', redirect: 'follow',
                body: JSON.stringify({ action: "forgotPassword", mobile: globalMobileNumber, batch: globalBatch }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "otp_sent") {
                    showMessage(data.message, "success");
                    document.getElementById('step-3').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                } else showMessage(data.message, "error");
            }).catch(e => showMessage("Network error.", "error"));
        }

        function showMessage(msg, type) {
            const box = document.getElementById('message-box');
            box.classList.remove('hidden');
            
            if (msg.toLowerCase().includes("pending approval")) {
                box.className = "";
                box.style.backgroundColor = "#fffbeb";
                box.style.color = "#b45309";
                box.style.border = "1px solid #f59e0b";
                box.style.padding = "15px";
                box.innerHTML = `<b>⏳ Approval Pending</b><br><br>${msg}`;
            } else {
                box.className = type;
                box.style.backgroundColor = ""; 
                box.style.color = "";
                box.style.border = "";
                box.style.padding = "15px";
                box.textContent = msg;
            }
        }
    </script>
</body>
</html>
